# 작성일   : 2026-07-20
#
#
# 변경사항 내역 (날짜, 변경목적, 변경내용 순으로 기입)
#   2026-07-20 | 최초작성 | pytest pythonpath 및 ruff 기본 규칙 설정
# ----------------------------------------------------------------------------

[tool.pytest.ini_options]
# 프로젝트 루트를 import 경로에 추가하여 `from src.models import ...` 가 동작하게 한다.
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# E: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade, B: bugbear
select = ["E", "F", "I", "UP", "B"]
